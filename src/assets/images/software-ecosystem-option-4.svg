<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity="0.18"/>
    </filter>
    <style>
      .h { font: 700 50px Arial, sans-serif; fill: #fff; }
      .t1 { font: 700 42px Arial, sans-serif; fill: #0f172a; }
      .t2 { font: 600 24px Arial, sans-serif; fill: #334155; }
      .pill { font: 700 28px Arial, sans-serif; fill: #1e3a8a; }
      .flow { font: 700 36px Arial, sans-serif; fill: #fff; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg4)"/>
  <rect x="42" y="42" width="1316" height="736" rx="20" fill="#ffffff" stroke="#bfdbfe" stroke-width="3"/>

  <rect x="275" y="90" width="850" height="96" rx="18" fill="url(#bar4)"/>
  <text x="700" y="153" text-anchor="middle" class="h">AI SOFTWARE ECOSYSTEM</text>

  <!-- Orbit guides -->
  <circle cx="700" cy="405" r="210" fill="none" stroke="#bfdbfe" stroke-width="4" stroke-dasharray="12 12"/>
  <circle cx="700" cy="405" r="140" fill="none" stroke="#dbeafe" stroke-width="4"/>

  <!-- Center CRM -->
  <g filter="url(#sh4)">
    <circle cx="700" cy="405" r="120" fill="#eff6ff" stroke="#93c5fd" stroke-width="5"/>
    <circle cx="700" cy="405" r="78" fill="#ffffff"/>
    <text x="700" y="398" text-anchor="middle" class="t1">CRM</text>
    <text x="700" y="438" text-anchor="middle" class="t1">CORE</text>
  </g>

  <!-- Top AI Agent -->
  <g filter="url(#sh4)">
    <rect x="560" y="178" width="280" height="86" rx="43" fill="#f8fbff" stroke="#93c5fd" stroke-width="4"/>
    <text x="700" y="232" text-anchor="middle" class="pill">AI AGENT</text>
  </g>
  <line x1="700" y1="264" x2="700" y2="285" stroke="#60a5fa" stroke-width="5"/>

  <!-- Left RAG -->
  <g filter="url(#sh4)">
    <rect x="300" y="365" width="220" height="86" rx="43" fill="#f8fbff" stroke="#93c5fd" stroke-width="4"/>
    <text x="410" y="419" text-anchor="middle" class="pill">RAG</text>
  </g>
  <line x1="520" y1="408" x2="580" y2="408" stroke="#60a5fa" stroke-width="5"/>

  <!-- Right LLM -->
  <g filter="url(#sh4)">
    <rect x="880" y="365" width="220" height="86" rx="43" fill="#f8fbff" stroke="#93c5fd" stroke-width="4"/>
    <text x="990" y="419" text-anchor="middle" class="pill">LLM</text>
  </g>
  <line x1="820" y1="408" x2="880" y2="408" stroke="#60a5fa" stroke-width="5"/>

  <!-- Bottom capability chips -->
  <g filter="url(#sh4)">
    <rect x="420" y="560" width="220" height="74" rx="37" fill="#eef2ff" stroke="#93c5fd" stroke-width="3"/>
    <text x="530" y="608" text-anchor="middle" class="pill">MOBILE APP</text>
  </g>
  <g filter="url(#sh4)">
    <rect x="760" y="560" width="220" height="74" rx="37" fill="#eef2ff" stroke="#93c5fd" stroke-width="3"/>
    <text x="870" y="608" text-anchor="middle" class="pill">BI APP</text>
  </g>

  <text x="700" y="520" text-anchor="middle" class="t2">Unified customer intelligence and workflow automation</text>

  <rect x="130" y="710" width="1140" height="64" rx="32" fill="url(#bar4)"/>
  <text x="700" y="752" text-anchor="middle" class="flow">AI AGENTS | RAG | LLM WORKFLOWS</text>
</svg>
