<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1e3a8a" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 52px Arial, sans-serif; fill: #ffffff; }
      .nodeTitle { font: 700 38px Arial, sans-serif; fill: #1e3a8a; }
      .nodeSub { font: 600 24px Arial, sans-serif; fill: #334155; }
      .coreTitle { font: 700 44px Arial, sans-serif; fill: #0f172a; }
      .coreSub { font: 600 26px Arial, sans-serif; fill: #334155; }
      .chipText { font: 700 38px Arial, sans-serif; fill: #ffffff; }
      .tagText { font: 700 28px Arial, sans-serif; fill: #1e3a8a; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect x="36" y="36" width="1328" height="748" rx="18" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/>

  <!-- Header -->
  <rect x="280" y="90" width="840" height="96" rx="18" fill="url(#blueBar)"/>
  <text x="700" y="155" text-anchor="middle" class="title">AI SOFTWARE ECOSYSTEM</text>

  <!-- Connection lines -->
  <line x1="700" y1="390" x2="455" y2="295" stroke="#93c5fd" stroke-width="6" stroke-dasharray="12 12"/>
  <line x1="700" y1="390" x2="945" y2="295" stroke="#93c5fd" stroke-width="6" stroke-dasharray="12 12"/>
  <line x1="700" y1="390" x2="700" y2="565" stroke="#93c5fd" stroke-width="6" stroke-dasharray="12 12"/>

  <!-- Center CRM -->
  <g filter="url(#softShadow)">
    <circle cx="700" cy="390" r="160" fill="#f8fbff" stroke="#93c5fd" stroke-width="5"/>
    <circle cx="700" cy="390" r="112" fill="#dbeafe"/>
    <circle cx="700" cy="390" r="86" fill="#ffffff"/>
    <text x="700" y="382" text-anchor="middle" class="coreTitle">CRM</text>
    <text x="700" y="424" text-anchor="middle" class="coreTitle">CORE</text>
    <text x="700" y="472" text-anchor="middle" class="coreSub">Leads, Pipeline, Support</text>
  </g>

  <!-- AI Agent node -->
  <g filter="url(#softShadow)">
    <rect x="330" y="220" width="250" height="150" rx="22" fill="#f8fbff" stroke="#93c5fd" stroke-width="4"/>
    <circle cx="390" cy="274" r="28" fill="#dbeafe"/>
    <circle cx="390" cy="274" r="10" fill="#2563eb"/>
    <path d="M372 292h36" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
    <text x="470" y="285" text-anchor="middle" class="nodeTitle">AI AGENT</text>
    <text x="470" y="325" text-anchor="middle" class="nodeSub">Task Automation</text>
  </g>

  <!-- RAG node -->
  <g filter="url(#softShadow)">
    <rect x="820" y="220" width="250" height="150" rx="22" fill="#f8fbff" stroke="#93c5fd" stroke-width="4"/>
    <circle cx="880" cy="274" r="28" fill="#dbeafe"/>
    <path d="M866 262h28M866 274h22M866 286h28" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <text x="960" y="285" text-anchor="middle" class="nodeTitle">RAG</text>
    <text x="960" y="325" text-anchor="middle" class="nodeSub">Context Retrieval</text>
  </g>

  <!-- LLM node -->
  <g filter="url(#softShadow)">
    <rect x="575" y="565" width="250" height="150" rx="22" fill="#f8fbff" stroke="#93c5fd" stroke-width="4"/>
    <circle cx="635" cy="620" r="28" fill="#dbeafe"/>
    <path d="M620 620c0-8 7-14 15-14h1c4-7 15-9 22-4 5 3 8 8 8 14 8 0 14 6 14 14 0 8-6 14-14 14h-31c-8 0-15-6-15-14z" fill="#2563eb"/>
    <text x="710" y="630" text-anchor="middle" class="nodeTitle">LLM</text>
    <text x="710" y="670" text-anchor="middle" class="nodeSub">Language Intelligence</text>
  </g>

  <!-- Side tags -->
  <rect x="140" y="330" width="150" height="62" rx="31" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
  <text x="215" y="370" text-anchor="middle" class="tagText">MOBILE</text>
  <rect x="1110" y="330" width="150" height="62" rx="31" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
  <text x="1185" y="370" text-anchor="middle" class="tagText">BI APP</text>

  <!-- Bottom strip -->
  <rect x="170" y="728" width="1060" height="62" rx="31" fill="url(#blueBar)"/>
  <text x="700" y="770" text-anchor="middle" class="chipText">AI AGENTS | RAG | LLM WORKFLOWS</text>
</svg>
